<!DOCTYPE html>
<html>
<head>

<title>Maverick Data Hub</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
text-align:center;
padding:20px;
}

.header{
background:#0066ff;
color:white;
padding:25px;
border-radius:15px;
}

.box{
background:white;
padding:20px;
margin:20px auto;
border-radius:15px;
max-width:500px;
box-shadow:0 0 10px #ccc;
}

input,select,button{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#0066ff;
color:white;
border:none;
font-size:16px;
}

button:hover{
background:#004dcc;
}

h1{
margin:0;
}

</style>

</head>

<body>

<div class="header">
<h1>Maverick Data Hub</h1>
<p>Fast & Affordable Data Bundles</p>
</div>


<div class="box">

<h2>Buy Data</h2>

<input id="name" placeholder="Your Name">

<input id="phone" placeholder="Your Phone Number">


<select id="network">
<option>MTN</option>
<option>Telecel</option>
<option>AirtelTigo</option>
</select>


<select id="bundle">
<option>1GB Data</option>
<option>2GB Data</option>
<option>5GB Data</option>
<option>10GB Data</option>
</select>


<input type="file" id="proof">

<button onclick="placeOrder()">
Place Order
</button>

<p id="message"></p>

</div>
<div class="box">

<h2>How To Order</h2>

<p>1. Select your data bundle</p>
<p>2. Make payment</p>
<p>3. Upload payment proof</p>
<p>4. Submit your order</p>

</div>


<div class="box">

<h2>Contact Maverick Data Hub</h2>

<p>Fast delivery. Reliable service. ✅</p>

<a href="https://wa.me/233546155096" target="_blank">
<button>
Chat on WhatsApp
</button>
</a>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {
  apiKey: "AIzaSyDVMhdWshHyn2sRFKtiF1mu9rR82PzRXJM",
  authDomain: "maverick-data-hub-bc904.firebaseapp.com",
  databaseURL: "https://maverick-data-hub-3fd58-default-rtdb.firebaseio.com",
  projectId: "maverick-data-hub-bc904",
  storageBucket: "maverick-data-hub-bc904.firebasestorage.app",
  messagingSenderId: "161516394504",
  appId: "1:161516394504:web:2c95b5fb969628452099bd"
};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);


window.placeOrder = async function(){

const name = document.getElementById("name").value;
const phone = document.getElementById("phone").value;
const network = document.getElementById("network").value;
const bundle = document.getElementById("bundle").value;
const proof = document.getElementById("proof").files[0];

const message = document.getElementById("message");


if(!name || !phone || !proof){

message.innerHTML = "Please fill all details and upload payment proof.";
return;

}


message.innerHTML = "Uploading payment proof...";


let formData = new FormData();

formData.append("file", proof);

formData.append("upload_preset","mdh_payment_upload");


let upload = await fetch(
"https://api.cloudinary.com/v1_1/maverick_upload/image/upload",
{
method:"POST",
body:formData
}
);


let imageData = await upload.json();

let imageUrl = imageData.secure_url;


message.innerHTML = "Saving order...";


let order = push(ref(db,"orders"));


await set(order,{

name:name,
phone:phone,
network:network,
bundle:bundle,
paymentProof:imageUrl,
date:new Date().toString()

});


message.innerHTML = "Order sent successfully ✅";


let text =
`Hello Maverick Data Hub%0A%0A`+
`New Order%0A`+
`Name: ${name}%0A`+
`Phone: ${phone}%0A`+
`Network: ${network}%0A`+
`Bundle: ${bundle}%0A`+
`Proof: ${imageUrl}`;


window.open(
"https://wa.me/233546155096?text="+text,
"_blank"
);


}

</script>
    </body>
</html>
