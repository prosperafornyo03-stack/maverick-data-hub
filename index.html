<div class="box">
<h2>📝 Order Details</h2>

<input id="name" placeholder="Your Name">

<input id="phone" placeholder="Phone Number">

<select id="network">
<option>Select Network</option>
<option>MTN</option>
<option>Telecel</option>
<option>AirtelTigo</option>
</select>

<select id="bundle">
<option>Select Bundle</option>
<option>1GB</option>
<option>10GB</option>
<option>100GB</option>
</select>

<br>

<button onclick="sendOrder()">Send Order on WhatsApp</button>

</div>

<script>
function sendOrder(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let network = document.getElementById("network").value;
let bundle = document.getElementById("bundle").value;

let message = 
"Hello Maverick Data Hub,%0A%0A" +
"Name: " + name + "%0A" +
"Phone: " + phone + "%0A" +
"Network: " + network + "%0A" +
"Bundle: " + bundle;

window.open(
"https://wa.me/233546155096?text=" + message,
"_blank"
);

}
</script>
