<h2>📝 Place Your Order</h2>

<div class="package">
<form onsubmit="sendOrder(); return false;">

<label>Your Name:</label><br>
<input id="name" type="text" placeholder="Enter your name"><br><br>

<label>Your Phone Number:</label><br>
<input id="number" type="text" placeholder="Enter phone number"><br><br>

<label>Select Data Package:</label><br>
<select id="package">
  <option>1GB - GH₵5</option>
  <option>5GB - GH₵20</option>
  <option>10GB - GH₵35</option>
</select>

<br><br>

<button type="submit">Submit Order</button>

</form>
</div>

<script>
function sendOrder() {
  var name = document.getElementById("name").value;
  var number = document.getElementById("number").value;
  var pack = document.getElementById("package").value;

  var message = "Hello Maverick Data Hub 👋🏾%0A%0A" +
                "Name: " + name + "%0A" +
                "Phone: " + number + "%0A" +
                "Package: " + pack;

  window.open("https://wa.me/233546155096?text=" + message, "_blank");
}
</script>
