<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Maverick Admin</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}

h1{
text-align:center;
color:#0066ff;
}

.order{
background:white;
padding:15px;
margin:15px auto;
border-radius:10px;
box-shadow:0 0 8px #ccc;
max-width:500px;
}

img{
width:100%;
border-radius:10px;
}

button{
background:#0066ff;
color:white;
border:none;
padding:10px;
border-radius:8px;
}

</style>

</head>

<body>

<h1>🔥 Maverick Admin Dashboard</h1>

<div id="orders">
Loading orders...
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyDVMhdWshHyn2sRFKtiF1mu9rR82PzRXJM",

authDomain: "maverick-data-hub-bc904.firebaseapp.com",

databaseURL: "https://maverick-data-hub-bc904-default-rtdb.firebaseio.com",

projectId: "maverick-data-hub-bc904",

storageBucket: "maverick-data-hub-bc904.firebasestorage.app",

messagingSenderId: "161516394504",

appId: "1:161516394504:web:2c95b5fb969628452099bd"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);


const ordersBox = document.getElementById("orders");


onValue(ref(db,"orders"), (snapshot)=>{


ordersBox.innerHTML="";


snapshot.forEach((child)=>{


let order = child.val();


ordersBox.innerHTML += `

<div class="order">

<h3>New Order</h3>

<p><b>Name:</b> ${order.name}</p>

<p><b>Phone:</b> ${order.phone}</p>

<p><b>Bundle:</b> ${order.bundle}</p>

<p><b>Date:</b> ${order.date}</p>


<p>Payment Proof:</p>

<img src="${order.paymentProof}">


<br><br>

<a href="${order.paymentProof}" target="_blank">

<button>Open Image</button>

</a>


</div>

`;

});


});


</script>


</body>
</html>
