<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Maverick Data Hub Admin</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
text-align:center;
padding:20px;
}

h1{
background:#0066ff;
color:white;
padding:20px;
border-radius:15px;
}

.card{
background:white;
padding:20px;
margin:15px auto;
border-radius:15px;
max-width:400px;
box-shadow:0 0 10px #ccc;
}

.pending{
color:orange;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🔥 Maverick Data Hub Admin 🔥</h1>

<h2>Customer Orders</h2>

<div id="orders">
Loading orders...
</div>


<script>

fetch("orders.json")

.then(response => response.json())const SUPABASE_URL = "https://vkylgfklycpeemgwjnwn.supabase.co";

const SUPABASE_KEY = "PASTE_YOUR_ANON_KEY_HERE";


fetch(SUPABASE_URL + "/rest/v1/orders?select=*",
{
headers:{
"apikey": SUPABASE_KEY,
"Authorization":"Bearer "+SUPABASE_KEY
}
})
.then(response=>response.json())
.then(orders=>{

let output="";

orders.forEach(order=>{

output += `
<div class="order">
<h3>Order Found ✅</h3>

<p>Name: ${order.name}</p>
<p>Network: ${order.network}</p>
<p>Package: ${order.amount}</p>
<p>Phone: ${order.phone}</p>
<p>Status: ${order.status}</p>

</div>
`;

});

document.getElementById("orders").innerHTML = output;

})
.catch(error=>{

document.getElementById("orders").innerHTML =
"Error loading orders";

});

.then(data => {

let box = document.getElementById("orders");box.innerHTML="";

data.forEach(order => {

box.innerHTML += `

<div class="card">

<h3>${order.name}</h3>

<p>📱 Network: ${order.network}</p>

<p>📦 Package: ${order.amount}</p>

<p>☎️ Phone: ${order.phone}</p>

<p class="pending">⏳ Status: ${order.status}</p>

</div>

`;

});

})

.catch(error=>{

document.getElementById("orders").innerHTML =
"Error loading orders";

});

</script>


</body>
</html>
