<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Maverick Data Hub Admin</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
text-align:center;
}

.box{
background:white;
padding:20px;
margin:15px auto;
border-radius:15px;
max-width:600px;
box-shadow:0 0 10px #ccc;
}

img{
width:200px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>🔥 Maverick Data Hub Admin 🔥</h1>

<div id="orders"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyDVMhdWshHyn2sRFKtiF1mu9rR82PzRXJM",

authDomain: "maverick-data-hub-bc904.firebaseapp.com",

databaseURL: "https://maverick-data-hub-bc904-default-rtdb.firebaseio.com",

projectId: "maverick-data-hub-bc904",

storageBucket: "maverick-data-hub-bc904.firebasestorage.app",

messagingSenderId: "161516394504",

appId: "1:161516394504:web:2c95b5fb969628452099bd"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);


const orders = document.getElementById("orders");


onValue(ref(db,"orders"),(snapshot)=>{


orders.innerHTML="";


snapshot.forEach((child)=>{


let data = child.val();


orders.innerHTML += `

<div class="box">

<h3>New Order</h3>

<p>Name: ${data.name}</p>

<p>Phone: ${data.phone}</p>

<p>Network: ${data.network}</p>

<p>Bundle: ${data.bundle}</p>

<img src="${data.paymentProof}">

<p>${data.date}</p>

</div>

`;

});


});


</script>

</body>
</html>
