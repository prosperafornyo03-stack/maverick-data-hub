<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Maverick Data Hub Admin</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
text-align:center;
padding:20px;
}

h1{
background:#0066ff;
color:white;
padding:20px;
border-radius:15px;
}

.card{
background:white;
padding:20px;
margin:15px auto;
border-radius:15px;
max-width:400px;
box-shadow:0 0 10px #ccc;
}

.pending{
color:orange;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🔥 Maverick Data Hub Admin 🔥</h1>

<h2>Customer Orders</h2>

<div id="orders">
Loading orders...
</div>


<script>

fetch("orders.json")

.then(response => response.json())

.then(data => {

let box = document.getElementById("orders");

box.innerHTML="";

data.forEach(order => {

box.innerHTML += `

<div class="card">

<h3>${order.name}</h3>

<p>📱 Network: ${order.network}</p>

<p>📦 Package: ${order.amount}</p>

<p>☎️ Phone: ${order.phone}</p>

<p class="pending">⏳ Status: ${order.status}</p>

</div>

`;

});

})

.catch(error=>{

document.getElementById("orders").innerHTML =
"Error loading orders";

});

</script>


</body>
</html>
